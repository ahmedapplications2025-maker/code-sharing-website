<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أضف كود جديد - أكواد عربية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* نفس تنسيقات الموقع الرئيسي */
        body {
            font-family: system-ui, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            direction: rtl;
            margin: 0;
            padding: 20px;
        }
        
        .form-container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        textarea {
            font-family: 'Courier New', monospace;
            min-height: 300px;
        }
        
        .submit-btn {
            background: #2563eb;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        
        .submit-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-plus"></i> أضف كود جديد
        </h1>
        
        <form id="add-code-form">
            <div class="form-group">
                <label>عنوان الكود</label>
                <input type="text" id="title" placeholder="مثال: دالة تحويل التاريخ" required>
            </div>
            
            <div class="form-group">
                <label>لغة البرمجة</label>
                <select id="language" required>
                    <option value="">اختر اللغة</option>
                    <option value="js">JavaScript</option>
                    <option value="py">Python</option>
                    <option value="html">HTML</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>الكود البرمجي</label>
                <textarea id="code-content" placeholder="الصق كودك هنا..." required></textarea>
            </div>
            
            <div class="form-group">
                <label>اسمك (اختياري)</label>
                <input type="text" id="author" placeholder="سيظهر كمطور الكود">
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> نشر الكود
            </button>
        </form>
    </div>
    
    <script>
        // نفس السكريبت من index.html
        document.getElementById('add-code-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newCode = {
                id: Date.now(),
                title: document.getElementById('title').value,
                language: document.getElementById('language').value,
                code: document.getElementById('code-content').value,
                author: document.getElementById('author').value || "مجهول",
                date: new Date().toISOString().split('T')[0],
                likes: 0,
                views: 0
            };
            
            // حفظ في localStorage
            let codes = JSON.parse(localStorage.getItem('arabic-codes') || '[]');
            codes.unshift(newCode);
            localStorage.setItem('arabic-codes', JSON.stringify(codes));
            
            alert('تم إضافة الكود بنجاح!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
